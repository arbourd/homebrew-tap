name: formula

on:
  pull_request:
    paths:
      - .github/workflows/formula.yml
      - Formula/*.rb
  push:
    branches:
      - main

jobs:
  list:
    runs-on: ubuntu-latest
    outputs:
      formulae: ${{ steps.formulae.outputs.result }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/github-script@v9
        id: formulae
        with:
          script: |
            const globber = await glob.create('Formula/*.rb')
            const paths = await globber.glob()

            let formulae = paths.map((path, i) => {
              return path.split('/').pop().replace(/\.rb$/, '')
            })

            console.log(formulae)
            return formulae

  test:
    runs-on: ${{ matrix.os }}
    needs: [list]
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
        formula: ${{ fromJson(needs.list.outputs.formulae) }}
        exclude:
          - os: ubuntu-latest
            formula: trash

    env:
      HOMEBREW_GITHUB_ACTIONS: 1
      HOMEBREW_NO_ANALYTICS: 1
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v7

      - uses: Homebrew/actions/setup-homebrew@main
        id: set-up-homebrew

      - name: Tap repository
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/arbourd"
          ln -s "$PWD" "$(brew --repository)/Library/Taps/arbourd/homebrew-tap"

      - if: ${{ matrix.formula == 'go' }}
        name: brew uninstall go
        run: |
          versions=$(brew list | grep -E '^go$|^go@' || true)
          echo $versions

          for v in $versions
          do
            echo "brew uninstall $v"
            brew uninstall $v
          done

      - name: brew style ${{ matrix.formula }}
        run: brew style -v arbourd/tap/${{ matrix.formula }}

      - name: brew install ${{ matrix.formula }}
        run: brew install -v arbourd/tap/${{ matrix.formula }}

      - name: brew test ${{ matrix.formula }}
        run: brew test -v arbourd/tap/${{ matrix.formula }}
        if: ${{ matrix.formula != 'trash' }}
